<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主播歌切播放器</title>
    <link rel="stylesheet" href="songcuts.css">
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
    <main class="page-shell">
        <section class="hero-card">
            <p class="eyebrow">Songcuts Player</p>
            <h1>主播歌切播放器</h1>
            <p class="hero-copy">这里是公开歌切播放页，可以按分类筛选、搜索并播放已经整理好的歌切。</p>
            <div class="hero-actions">
                <a class="chip-link" href="/">返回主页</a>
            </div>
        </section>

        <section class="player-layout">
            <div class="panel now-playing-panel">
                <div class="panel-heading">
                    <p class="panel-kicker">Now Playing</p>
                    <h2 id="currentTitle">还没有开始播放</h2>
                    <p id="currentMeta" class="current-meta">先从右侧歌单中点一首试试。</p>
                </div>

                <audio id="mainPlayer" class="main-player" controls preload="metadata"></audio>

                <div class="player-actions">
                    <button id="prevButton" type="button">上一首</button>
                    <button id="toggleButton" type="button">播放 / 暂停</button>
                    <button id="nextButton" type="button">下一首</button>
                    <button id="randomButton" type="button">随机播放</button>
                </div>

                <div class="player-mode-bar">
                    <div class="field">
                        <label for="playbackMode">播放结束后</label>
                        <select id="playbackMode">
                            <option value="pause">暂停</option>
                            <option value="next">自动下一首</option>
                            <option value="random">随机播放</option>
                        </select>
                    </div>
                    <p id="modeHint" class="mode-hint">当前模式：播完暂停</p>
                </div>

                <div class="tips-card">
                    <h3>歌切说明</h3>
                    <p>这里展示的是已经整理完成的歌切内容。管理配置、录播导入和自动提取不在公开页面展示。</p>
                </div>
            </div>

            <div class="panel playlist-panel">
                <div class="toolbar">
                    <div class="field">
                        <label for="categoryFilter">分类</label>
                        <select id="categoryFilter">
                            <option value="">全部分类</option>
                        </select>
                    </div>

                    <div class="field field-search">
                        <label for="searchInput">搜索</label>
                        <input id="searchInput" type="search" placeholder="输入歌名、文件名或分类">
                    </div>
                </div>

                <div class="playlist-header">
                    <h2>歌切列表</h2>
                    <p id="resultSummary">正在加载歌切...</p>
                </div>

                <div id="emptyState" class="empty-state" hidden>
                    <p>当前还没有歌切文件。</p>
                </div>

                <div id="songList" class="song-list"></div>
            </div>
        </section>
    </main>

    <script src="songcuts.js"></script>
</body>
</html>
